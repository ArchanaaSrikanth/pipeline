name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify index.html exists
        run: |
          ls -l
          test -f index.html

      - name: Build Success
        run: echo "Build completed successfully"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Step
        run: echo "Deploying application..."